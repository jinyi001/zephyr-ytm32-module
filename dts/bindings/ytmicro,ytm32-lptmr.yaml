description: YTMicro YTM32 low-power timer counter

compatible: "ytmicro,ytm32-lptmr"

include: base.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  clocks:
    type: phandle-array
    required: true
    description: LPTMR peripheral clock specifier from the CGU.

  ytmicro,functional-clock-source:
    type: int
    required: true
    description: |
      Functional clock source selection for this LPTMR.
      Use `YTM32_CLOCK_SRC_*` values from
      `zephyr/dt-bindings/clock/ytmicro,ytm32-clock.h`.

  ytmicro,prescaler:
    type: int
    required: false
    default: 1
    description: |
      Prescaler for LPTMR. Valid values are 1 (bypass), 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048, 4096, 8192, 16384, 32768, 65536.
