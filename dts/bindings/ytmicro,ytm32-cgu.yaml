description: YTMicro YTM32 Clock Generation Unit (CGU)

compatible: "ytmicro,ytm32-cgu"

include: [clock-controller.yaml, base.yaml]

properties:
  "#clock-cells":
    const: 1

  core-clock:
    type: int
    required: true
    description: |
      Target core clock frequency in Hz.
      Example: 120000000

  core-divider:
    type: int
    required: true
    description: |
      Divider for the core clock relative to the system oscillator/PLL.
      Valid values depend on the specific SoC (e.g., 1, 2, 4...).

  fast-bus-divider:
    type: int
    required: false
    default: 1
    description: |
      Divider for the fast bus clock relative to the selected system clock.
      MVP-3 keeps the FIRC profile fixed and currently supports fast bus
      divider 1 only.

  slow-bus-divider:
    type: int
    required: false
    description: |
      Divider for the slow bus clock relative to the selected system clock.
      This is the preferred property for YTM32 SCU bus clock description.

  bus-divider:
    type: int
    required: false
    deprecated: true
    description: |
      Legacy alias for `slow-bus-divider`.
      Keep this only for transition from the early single-bus model.

clock-cells:
  - id
