description: YTM32 Pin Controller

compatible: "ytmicro,ytm32-pinctrl"

include:
  - name: base.yaml
  - name: pincfg-node.yaml

properties:
  clocks:
    type: phandle-array
    required: true
    description: |
      Clocks required by the pin controller (e.g. GPIO, PCTRL clocks).

child-binding:
  description: |
    YTM32 pin controller pin configuration state nodes.

  child-binding:
    description: |
      YTM32 pin controller pin configuration group nodes.

    properties:
      pinmux:
        required: true
        type: array
        description: |
          An array of pin configurations.
          Each configuration is a 32-bit integer combining port, pin, and mux function.
          Use the YTM32_PINMUX macro to construct these values.

      drive-strength:
        type: string
        enum:
          - "low"
          - "high"
        description: Drive strength of the pin.
      bias-pull-up:
        type: boolean
        description: Enable pull-up resistor.
      bias-pull-down:
        type: boolean
        description: Enable pull-down resistor.
      bias-disable:
        type: boolean
        description: Disable pull-up/down resistors.
      drive-open-drain:
        type: boolean
        description: Enable open-drain output.
      drive-push-pull:
        type: boolean
        description: Enable push-pull output.
      slew-rate:
        type: string
        enum:
          - "slow"
          - "fast"
        description: Slew rate of the pin.
      ytmicro,passive-filter:
        type: boolean
        description: Enable passive filter for the pin (YTMicro specific).
