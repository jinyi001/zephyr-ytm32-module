# Available runners configured by board.cmake.
runners:
- jlink

# Default flash runner if --runner is not given.
flash-runner: jlink

# Default debug runner if --runner is not given.
debug-runner: jlink

# Common runner configuration values.
config:
  board_dir: C:/Users/JinYi/zephyrproject/zephyr-ytm32-module/boards/ytmicro/ytm32b1mc0_evb
  # Build outputs:
  elf_file: zephyr.elf
  bin_file: zephyr.bin
  # Host tools:
  gdb: C:/Users/JinYi/zephyr-sdk-0.17.4/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb.exe

# Runner specific arguments
args:
  jlink:
    - --dt-flash=y
    - --device=YTM32B1MC03
    - --iface=swd
    - --speed=4000
